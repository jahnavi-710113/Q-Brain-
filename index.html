<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ultimate Quiz App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- INTRO SECTION -->

    <section class="intro" id="intro">

        <h1>Ultimate Quiz Challenge</h1>

        <p>
            Test your knowledge in GK, Cricket, History & Politics
        </p>

        <!-- USER NAME -->

        <input
            type="text"
            id="username"
            placeholder="Enter Your Name">

        <a href="#main">

            <button class="start">
                Start Quiz
            </button>

        </a>

    </section>

    <!-- QUIZ SECTION -->

    <section class="main" id="main">

        <div class="innerdiv">

            <!-- QUIZ CARD -->

            <div class="card">

                <div class="top-bar">

                    <h3>Quiz App</h3>

                    <span>10 Questions</span>

                </div>

                <!-- QUESTION -->

                <div class="question-box">

                    <h2 class="que">
                        Question Comes Here
                    </h2>

                </div>

                <!-- OPTIONS -->

                <div class="options">

                    <ul>

                        <li>

                            <input
                                type="radio"
                                name="answer"
                                id="ans1"
                                class="answer">

                            <label
                                for="ans1"
                                id="option1">
                            </label>

                        </li>

                        <li>

                            <input
                                type="radio"
                                name="answer"
                                id="ans2"
                                class="answer">

                            <label
                                for="ans2"
                                id="option2">
                            </label>

                        </li>

                        <li>

                            <input
                                type="radio"
                                name="answer"
                                id="ans3"
                                class="answer">

                            <label
                                for="ans3"
                                id="option3">
                            </label>

                        </li>

                        <li>

                            <input
                                type="radio"
                                name="answer"
                                id="ans4"
                                class="answer">

                            <label
                                for="ans4"
                                id="option4">
                            </label>

                        </li>

                    </ul>

                </div>

                <!-- SUBMIT BUTTON -->

                <div class="btn-box">

                    <button id="submit">

                        Next Question

                    </button>

                </div>

                <!-- WARNING -->

                <h5 class="warning">

                    Please select an option

                </h5>

            </div>

            <!-- SCORE SECTION -->

            <div class="score">

                <h2 class="player-name">

                </h2>

                <h3>

                    Your Final Score

                </h3>

                <h1>

                    0/10

                </h1>

                <h4>

                </h4>

                <button
                    class="retry"
                    onclick="retry()">

                    Play Again

                </button>

                <a
                    href="#intro"
                    onclick="retry()"
                    class="home-btn">

                    Reset & Go Home

                </a>

            </div>

        </div>

    </section>

    <script src="index.js"></script>

</body>

</html>
